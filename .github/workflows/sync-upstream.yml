# sync upstream main (apply upstream versions for conflicting files)

name: Sync upstream main (direct merge)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday 00:00 UTC

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    name: Sync upstream main (direct merge)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/MZRidaz/GLaDOS-Auto-Checkin.git || true
          git fetch upstream --no-tags --prune --depth=1

      - name: Check for upstream changes
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          ORIGIN_SHA=$(git rev-parse origin/main)
          echo "upstream: $UPSTREAM_SHA"
          echo "origin:   $ORIGIN_SHA"
          if [ "$UPSTREAM_SHA" = "$ORIGIN_SHA" ]; then
            echo "Upstream is up-to-date. Nothing to do."
            exit 0
          fi

      - name: Apply upstream versions for conflicting files
        run: |
          git fetch upstream
          # Checkout upstream versions of the conflicting files into the working tree
          git checkout upstream/main -- .github/workflows/glados.yml README.md checkin.py
          git commit -m "sync: accept upstream versions for conflicting files" || true

      - name: Push changes to origin/main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin HEAD:main

      - name: Done
        run: echo "Applied upstream versions and pushed to origin/main."